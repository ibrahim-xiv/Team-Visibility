<!DOCTYPE html>
<html lang="de">
<head>
  <style>
    /* 1. Design-Variablen: Definition von Farben, Abständen und Schatten für ein einheitliches Look & Feel */
    :root {
      --bg: #f6efe7;
      --surface: #fffaf6;
      --text: #3b342e;
      --muted: #7a6f67;
      --primary: #8fb8e8;
      --primary-hover: #7aa9df;
      --success: #bddcab;
      --success-hover: #abd294;
      --shadow: 0 14px 30px rgba(104, 88, 76, 0.10);
      --radius-md: 14px;
      --radius-sm: 10px;
      --border-strong: rgba(59, 52, 46, 0.45);
      --error: #d95c5c;
      --error-bg: #fff1f1;
    }

    * { box-sizing: border-box; }

    /* 2. Basis-Layout: Zentrierung der App-Ansicht auf dem Bildschirm */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, textarea, select { font: inherit; }

    /* 3. Phone-Container: Simuliert das Gehäuse eines Smartphones */
    .phone {
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border: 2px solid rgba(59, 52, 46, 0.35);
      border-radius: 34px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    /* 4. Header-Bereich: Titel der Seite und Zurück-Button */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 22px 20px 18px;
      border-bottom: 2px solid rgba(59, 52, 46, 0.3);
      background: rgba(255, 255, 255, 0.35);
    }

    .back-btn {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-md);
      border: 2px solid var(--border-strong);
      background: #fff;
      display: grid;
      place-items: center;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.1;
    }

    .content { padding: 24px 18px 22px; }

    /* 5. Formular-Styling: Gestaltung der Eingabefelder und Labels */
    form {
      display: grid;
      gap: 14px;
    }

    .form-group { display: block; }

    label {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .required-star {
      color: var(--error);
      margin-left: 2px;
    }

    textarea,
    select,
    input[type="text"],
    input[type="date"],
    input[type="time"] {
      width: 100%;
      border: 2px solid var(--border-strong);
      border-radius: 0;
      background: #fff;
      padding: 12px 14px;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      min-height: 58px;
    }

    /* 6. Interaktive Elemente: Fokus-Effekte und Webkit-Kalender-Styling */
    input:focus,
    textarea:focus,
    select:focus {
      border-color: #5f87b3;
      box-shadow: 0 0 0 4px rgba(143, 184, 232, 0.22);
    }

    .split {
      display: grid;
      grid-template-columns: minmax(120px, 130px) minmax(0, 1fr);
      gap: 14px;
      align-items: end;
    }

    /* 7. Spezielle Felder: Checkbox-Karte und Info-Badge (Overlay-Trigger) */
    .checkbox-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--success);
      border: 2px solid var(--border-strong);
      border-radius: var(--radius-sm);
      font-weight: 800;
      cursor: pointer;
      min-height: 54px;
      position: relative;
    }

    .info-badge {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 2px solid var(--border-strong);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.82);
      margin-left: auto;
      cursor: pointer;
      z-index: 3;
    }

    .publish-btn {
      width: 100%;
      margin-top: 2px;
      padding: 18px 16px;
      border: 2px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: var(--text);
      font-size: 1.45rem;
      font-weight: 800;
      cursor: pointer;
    }

    /* 8. Validierung: Visuelles Feedback bei Fehlern */
    .is-invalid,
    .is-invalid input {
      border-color: var(--error) !important;
      background: var(--error-bg);
    }

    .error-text {
      margin-top: 6px;
      color: var(--error);
      font-size: 0.9rem;
      font-weight: 700;
      display: none;
    }

    .is-invalid .error-text { display: block; }

    /* 9. Modal/Overlay: Styling für das Informations-Fenster */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(59, 52, 46, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .overlay[hidden] { display: none; }

    .overlay-card {
      width: min(100%, 360px);
      background: #fffdf9;
      border: 2px solid var(--border-strong);
      border-radius: 18px;
      padding: 18px;
    }

    /* 10. Responsive Design: Anpassung für kleinere Bildschirme */
    @media (max-width: 480px) {
      h1 { font-size: 1.7rem; }
      .publish-btn { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <main class="phone">
    <header class="header">
      <button class="back-btn" type="button" aria-label="Zurück">&#8249;</button>
      <h1>Treffen Erstellen</h1>
    </header>

    <section class="content">
      <form id="eventForm" novalidate>
        
        <div class="form-group" data-field="titel">
          <label for="titel">Titel<span class="required-star">*</span></label>
          <input id="titel" name="titel" type="text" placeholder="z.B. Brettspiel" required>
          <div class="error-text">Bitte Titel ausfüllen.</div>
        </div>

        <div class="form-group" data-field="datum">
          <label for="datum">Datum</label>
          <input id="datum" name="datum" type="date">
        </div>

        <div class="split">
          <div class="form-group" data-field="uhrzeit">
            <label for="uhrzeit">Uhrzeit</label>
            <input id="uhrzeit" name="uhrzeit" type="time">
          </div>
          <div class="form-group" data-field="ort">
            <label for="ort">Ort<span class="required-star">*</span></label>
            <input id="ort" name="ort" type="text" placeholder="Adresse/Treffpunkt" required>
            <div class="error-text">Bitte Ort ausfüllen.</div>
          </div>
        </div>

        <div class="form-group" data-field="kategorie">
          <label for="kategorie">Kategorie<span class="required-star">*</span></label>
          <div class="select-wrap">
            <select id="kategorie" name="kategorie" required>
              <option value="">Kategorie wählen</option>
              <option>Freizeit</option>
              <option>Sport</option>
              <option>Spieleabend</option>
              <option>Kultur</option>
              <option>Community</option>
              <option>anderes...</option>
            </select>
          </div>
          <div class="error-text">Bitte Kategorie auswählen.</div>
        </div>

        <div class="form-group" data-field="beschreibung">
          <label for="beschreibung">Beschreibung<span class="required-star">*</span></label>
          <textarea id="beschreibung" name="beschreibung" placeholder="Beschreibe kurz dein Treffen..." required></textarea>
          <div class="error-text">Bitte Beschreibung ausfüllen.</div>
        </div>

        <div class="checkbox-wrap" data-field="kostenlos">
          <label class="checkbox-card" for="kostenlos">
            <input id="kostenlos" name="kostenlos" type="checkbox" required>
            <span>Kostenlos &amp; nicht-kommerziell <span class="required-star">*</span></span>
            <button class="info-badge" type="button" aria-label="Mehr Infos">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="12" cy="12" r="9"></circle>
                <line x1="12" y1="10" x2="12" y2="16"></line>
                <circle cx="12" cy="7" r="1"></circle>
              </svg>
            </button>
          </label>
          <div class="error-text">Bitte bestätigen.</div>
        </div>

        <button class="publish-btn" type="submit">Treffen veröffentlichen</button>
      </form>
    </section>
  </main>

  <div class="overlay" id="infoOverlay" hidden>
    <div class="overlay-card" role="dialog" aria-modal="true">
      <h2>Kostenlos &amp; nicht-kommerziell</h2>
      <p>Dieses Treffen ist gratis und dient nicht dem Verkauf von Dienstleistungen.</p>
      <button class="overlay-close" type="button" data-close-overlay>Verstanden</button>
    </div>
  </div>

  <script>
    // JS 1. Selektoren: Zugriff auf alle benötigten DOM-Elemente
    const infoBadge = document.querySelector('.info-badge');
    const infoOverlay = document.getElementById('infoOverlay');
    const closeOverlayBtn = document.querySelector('[data-close-overlay]');
    const form = document.getElementById('eventForm');
    const requiredFields = ['titel', 'ort', 'kategorie', 'beschreibung', 'kostenlos'];

    // JS 2. Overlay-Logik: Öffnen und Schließen des Info-Fensters
    infoBadge.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      infoOverlay.hidden = false;
    });

    closeOverlayBtn.addEventListener('click', () => infoOverlay.hidden = true);
    infoOverlay.addEventListener('click', (e) => { if (e.target === infoOverlay) infoOverlay.hidden = true; });

    // JS 3. Validierungs-Funktion: Prüft, ob ein Feld leer ist oder die Checkbox nicht angehakt wurde
    function validateField(fieldName) {
      const field = document.querySelector('[name="' + fieldName + '"]');
      const wrapper = document.querySelector('[data-field="' + fieldName + '"]');
      if (!field || !wrapper) return true;

      let valid = (field.type === 'checkbox') ? field.checked : field.value.trim() !== '';

      wrapper.classList.toggle('is-invalid', !valid);
      return valid; 
    }

    // JS 4. Echtzeit-Validierung: Prüft Felder sofort bei Eingabe oder Änderung
    requiredFields.forEach(function (fieldName) {
      const field = document.querySelector('[name="' + fieldName + '"]');
      const eventName = (field.type === 'checkbox' || field.tagName === 'SELECT') ? 'change' : 'input';

      field.addEventListener(eventName, () => validateField(fieldName));
    });

    // JS 5. Submit-Handler: Verhindert das Absenden, wenn Pflichtfelder fehlen
    form.addEventListener('submit', function (event) {
      let isFormValid = true;
      requiredFields.forEach(name => { if (!validateField(name)) isFormValid = false; });

      if (!isFormValid) event.preventDefault();
    });
  </script>
</body>
</html>
