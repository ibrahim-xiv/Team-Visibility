<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <title>Neues Nachbarschaftstreffen</title>
    <style>
        /* Fokus auf Barrierefreiheit (US 1) */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #000000; /* Maximaler Kontrast */
            font-size: 1.2rem; /* Große, lesbare Schrift für Senioren */
            line-height: 1.6;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            background: #ffffff;
            padding: 2rem;
            border: 2px solid #000000; /* Klare visuelle Grenzen */
            border-radius: 8px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 1.5rem;
        }
        input[type="text"], input[type="datetime-local"] {
            width: 100%;
            padding: 0.8rem;
            font-size: 1.2rem;
            border: 2px solid #333333;
            box-sizing: border-box;
        }
        input[type="checkbox"] {
            transform: scale(1.5); /* Große Checkbox für motorisch eingeschränkte Nutzer */
            margin-right: 10px;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            margin-top: 1.5rem;
        }
        button {
            margin-top: 2rem;
            padding: 1rem 2rem;
            font-size: 1.3rem;
            font-weight: bold;
            background-color: #005A9C; /* Kontrastreiches Blau */
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .success { color: #007A33; font-weight: bold; border-left: 4px solid #007A33; padding-left: 10px;}
        .error { color: #D32F2F; font-weight: bold; border-left: 4px solid #D32F2F; padding-left: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h1>Neues Treffen erstellen</h1>

    <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <form th:action="@{/treffen/neu}" th:object="${meeting}" method="post">
        
        <label for="title">Titel des Treffens (Pflichtfeld):</label>
        <input type="text" id="title" th:field="*{title}" required>

        <label for="date">Datum und Uhrzeit (Pflichtfeld):</label>
        <input type="datetime-local" id="date" th:field="*{meetingDate}" required>

        <label for="location">Ort (Pflichtfeld):</label>
        <input type="text" id="location" th:field="*{location}" required>

        <div class="checkbox-container">
            <input type="checkbox" id="nonProfit" th:field="*{nonProfit}" required>
            <label for="nonProfit" style="margin-top: 0;">Ich bestätige, dass dieses Treffen kostenfrei und nicht-kommerziell ist.</label>
        </div>

        <button type="submit">Treffen veröffentlichen</button>
    </form>
</div>

</body>
</html>
